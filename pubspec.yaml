name: seelai_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.0.3
  firebase_database: ^12.0.3
  provider: ^6.1.5+1
  firebase_messaging: ^16.0.3
  firebase_core: ^4.2.0
  camera: ^0.11.3
  intl: ^0.20.2
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  flutter_launcher_icons: ^0.14.4
  animated_splash_screen: ^1.3.0
  lottie: ^3.3.2
  flutter_native_splash: ^2.4.7
  flutter_osm_plugin: ^1.4.2
  image_picker: ^1.2.1
  firebase_storage: ^13.0.4
  http: ^1.6.0
  crypto: ^3.0.7
  geolocator: ^14.0.1

  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/profile/seelai.png"

flutter_native_splash:
  color: "#FAF5FF"
  android: true
  ios: true
