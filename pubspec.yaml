name: seelai_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.0.3
  firebase_database: ^12.0.3
  provider: ^6.1.5+1
  firebase_messaging: ^16.1.1
  firebase_core: ^4.2.0
  camera: ^0.11.3
  intl: ^0.20.2
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  flutter_launcher_icons: ^0.14.4
  animated_splash_screen: ^1.3.0
  lottie: ^3.3.2
  flutter_native_splash: ^2.4.7
  flutter_osm_plugin: ^1.4.2
  firebase_storage: ^13.0.4
  http: ^1.6.0
  crypto: ^3.0.7
  geolocator: ^14.0.1
  google_mlkit_text_recognition: ^0.15.0
  flutter_tts: ^4.2.3
  tflite_flutter: ^0.12.1
  image_picker: ^1.2.1
  image: ^4.5.4
  flutter_vision: ^2.0.0
  audioplayers: ^6.5.1
  timeago: ^3.7.1
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - assets/object_model/objects.tflite
    - assets/object_model/labels.txt
    - assets/face_model/face_detection.tflite
    - assets/face_model/labels.txt
    - assets/face_model/face.tflite
    - assets/object_model/seelai-objects.tflite
    - assets/face_model/final_face.tflite
    - assets/images/eye background.jpg
    - assets/images/partial.png
    - assets/images/caretaker.png
    - assets/images/mswd.png
    - assets/emergency_images/
    - assets/icons/
    - assets/icons/light-dark.json

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/profile/seelaii.png"

flutter_native_splash:
  color: "#FAF5FF"
  android: true
  ios: true
